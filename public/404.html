<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Siwakode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Sora', sans-serif; background: #0D1F18; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
      h1 { font-size: 6rem; line-height: 1; color: #A8E63D; margin-bottom: 0.5rem; }
      p { font-size: 1.25rem; opacity: 0.8; margin-bottom: 2rem; max-width: 400px; }
      a { display: inline-block; background: #A8E63D; color: #0D1F18; padding: 1rem 2rem; border-radius: 999px; font-weight: 700; text-decoration: none; transition: opacity 0.2s; }
      a:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div>
      <h1>404</h1>
      <p>Page not found. The page you're looking for doesn't exist or has been moved.</p>
      <a href="/">Go Home</a>
    </div>
  </body>
</html>
